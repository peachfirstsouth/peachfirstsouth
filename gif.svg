<svg fill="none" width="100%" height="220" xmlns="http://w3.org">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://w3.org">
      <style>
        /* Base Retro Container */
        .arcade-card {
          display: flex;
          align-items: center;
          background-color: #0c0c14;
          padding: 20px;
          font-family: "Courier New", Courier, monospace;
          
          /* 8-bit Box Shadow Border */
          border: 4px solid #fff;
          box-shadow: 
            0 0 0 4px #0c0c14, 
            0 0 0 8px #ff0055, 
            8px 8px 0 8px rgba(0, 0, 0, 0.5);
        }

        /* Pixelated Image Constraints */
        .pixel-gif {
          width: 1200px;
          height: 600px;
          object-fit: contain;
          
          /* Sharp pixels scaling */
          image-rendering: -webkit-optimize-contrast;
          image-rendering: crisp-edges;
          image-rendering: pixelated;
          
          /* Retro CRT glow */
          filter: drop-shadow(0 0 8px #ff0055);
        }

        /* UI Text Layout */
        .ui-content {
          margin-left: 30px;
          color: #00ffcc;
        }

        .status-bar {
          font-size: 14px;
          color: #fff;
          margin-bottom: 10px;
          text-transform: uppercase;
          letter-spacing: 2px;
        }

        /* Blinking Retro Cursor Animation */
        .typing-text {
          font-size: 20px;
          font-weight: bold;
          color: #00ffcc;
          text-shadow: 0 0 5px #00ffcc;
        }

        .cursor {
          animation: blink 0.8s infinite steps(1);
          color: #fff;
        }

        @keyframes blink {
          50% { opacity: 0; }
        }
      </style>

      <div class="arcade-card">
        <!-- Your pixel art GIF file -->
        <img class="pixel-gif" src="./Sprite-0001.gif" alt="Pixel Sprite" />
        
        <div class="ui-content">
          <div class="status-bar">👾 PLAYER 1 • HP 99/99</div>
          <div class="typing-text">
            <span>READY TO COMMIT</span><span class="cursor">_</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
